# Server Configuration
server.port=8080
spring.application.name=SmartBus

# Database Configuration (H2 in-memory for development)
spring.datasource.url=jdbc:h2:mem:smartbusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=SmartBus-JWT-Secret-Key-256bits-minimum-length-required
jwt.expiration=86400000

# Logging
logging.level.com.smartbus=INFO
logging.level.org.springframework.security=WARN

